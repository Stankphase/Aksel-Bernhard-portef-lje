<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksel Bernhard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5f3ef;
            color: #111;
            font-family: 'Fraunces', sans-serif;
            font-weight: 300;
            font-size: 13px;
            letter-spacing: 0.03em;
            line-height: 1.6;
            opacity: 0;
            animation: pageFadeIn 0.4s ease forwards;
        }
        @keyframes pageFadeIn { to { opacity: 1; } }

        /* ── Header ── */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 20;
            padding: 36px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Fraunces', sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #111;
            text-decoration: none;
        }
        .header-nav { display: flex; gap: 36px; }
        .header-nav a {
            font-size: 10px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: #b0ab9e;
            text-decoration: none;
            transition: color 0.25s;
        }
        .header-nav a:hover { color: #111; }

        /* ── Hero ── */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 40px 72px;
        }
        .hero img {
            max-height: 70%;
            max-width: 70%;
            object-fit: contain;
            display: block;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .hero img.loaded { opacity: 1; }

        /* ── Project list ── */
        main {
            padding: 0 40px 100px;
            display: flex;
            align-items: center;
            gap: 140px;
        }
        .project-list { list-style: none; flex: 1; max-width: 520px; }
        .project-item { border-top: 1px solid #e2ddd7; }
        .project-item:last-child { border-bottom: 1px solid #e2ddd7; }

        .project-link {
            display: flex;
            align-items: baseline;
            padding: 26px 0;
            text-decoration: none;
        }
        .project-name {
            font-family: 'Fraunces', sans-serif;
            font-size: clamp(16px, 2vw, 24px);
            font-weight: 300;
            font-style: italic;
            color: #111;
            flex: 1;
            line-height: 1.1;
            transition: color 0.3s;
        }
        .project-link:hover .project-name { color: #b0ab9e; }
        .project-count {
            font-size: 10px;
            letter-spacing: 0.18em;
            color: #d0ccc4;
            align-self: center;
        }

        /* ── Static preview panel ── */
        .project-preview {
            flex: 0 0 260px;
            position: relative;
            width: 260px;
            height: 340px;
        }
        .project-preview img {
            position: absolute;
            top: 0; left: 0;
            width: 260px;
            height: 340px;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* ── Contact ── */
        #contact {
            padding: 80px 40px;
            border-top: 1px solid #e2ddd7;
            max-width: 576px;
        }
        .contact-label {
            font-size: 9px;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: #b0ab9e;
            display: block;
            margin-bottom: 22px;
        }
        .contact-heading {
            font-family: 'Fraunces', sans-serif;
            font-size: clamp(26px, 3vw, 38px);
            font-weight: 300;
            font-style: italic;
            color: #111;
            line-height: 1.25;
            margin-bottom: 14px;
        }
        .contact-body {
            color: #8a8277;
            font-size: 13px;
            line-height: 1.75;
        }
        .contact-body a {
            color: #8a8277;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.25s;
        }
        .contact-body a:hover { color: #111; }

        /* ── Footer ── */
        footer {
            padding: 28px 40px;
            border-top: 1px solid #e2ddd7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .footer-copy { font-size: 10px; letter-spacing: 0.1em; color: #ccc8c0; }
        .footer-links { display: flex; gap: 28px; }
        .footer-links a {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #ccc8c0;
            text-decoration: none;
            transition: color 0.25s;
        }
        .footer-links a:hover { color: #111; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            header { padding: 20px 24px; }
            .header-nav { gap: 20px; }
            .header-nav a:first-child { display: none; }
            .hero { padding: 68px 20px 36px; }
            main { padding: 0 20px 64px; flex-direction: column; gap: 32px; }
            .project-list { max-width: 100%; }
            .project-preview { display: none; }
            .project-link { padding: 15px 0; }
            #contact { padding: 48px 20px; max-width: 100%; }
            footer { padding: 20px 24px; flex-direction: column; gap: 12px; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Aksel Bernhard</a>
        <nav class="header-nav">
            <a href="#work">Arbeid</a>
            <a href="#contact">Kontakt</a>
            <a href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
        </nav>
    </header>

    <!-- Hero: random Omen image -->
    <section class="hero">
        <img id="hero-img" src="" alt="">
    </section>

    <!-- Project list -->
    <main id="work">
        <ul class="project-list">
            <li class="project-item">
                <a href="omen.html" class="project-link"
                   data-preview="bilder/omen/omen 1.webp">
                    <span class="project-name">Omen</span>
                </a>
            </li>
            <li class="project-item">
                <a href="city.html" class="project-link"
                   data-preview="bilder/city/city 1.webp">
                    <span class="project-name">City</span>
                </a>
            </li>
            <li class="project-item">
                <a href="other.html" class="project-link"
                   data-preview="bilder/other/other 1.webp">
                    <span class="project-name">Other</span>
                </a>
            </li>
            <li class="project-item">
                <a href="soft.html" class="project-link"
                   data-preview="bilder/soft/soft 1.webp">
                    <span class="project-name">Soft</span>
                </a>
            </li>
            <li class="project-item">
                <a href="inge-bremnes.html" class="project-link"
                   data-preview="bilder/inge bremnes/inge bremnes1.webp">
                    <span class="project-name">Inge Bremnes</span>
                </a>
            </li>
            <li class="project-item">
                <a href="sivert-rundhovde.html" class="project-link"
                   data-preview="bilder/sivert rundhovde/sivert runhovde 1.webp">
                    <span class="project-name">Sivert Rundhovde</span>
                </a>
            </li>
            <li class="project-item">
                <a href="visne.html" class="project-link"
                   data-preview="bilder/visne/visne 1.webp">
                    <span class="project-name">Visne</span>
                </a>
            </li>
        </ul>
        <div class="project-preview">
            <img id="preview-img-a" src="" alt="">
            <img id="preview-img-b" src="" alt="">
        </div>
    </main>

    <section id="contact">
        <span class="contact-label">Kontakt</span>
        <h2 class="contact-heading">La oss snakke.</h2>
        <p class="contact-body">
            For oppdrag, utstillinger eller samarbeid —<br>
            <a href="mailto:din@epost.no">din@epost.no</a>
        </p>
    </section>

    <footer>
        <span class="footer-copy">© 2025 Aksel Bernhard</span>
        <div class="footer-links">
            <a href="https://instagram.com/" target="_blank" rel="noopener">Instagram</a>
        </div>
    </footer>


    <script>
        // ── Page transitions ──
        function navigateTo(href) {
            document.body.style.transition = 'opacity 0.35s ease';
            document.body.style.opacity = '0';
            setTimeout(() => location.href = href, 350);
        }
        document.querySelectorAll('a[href]').forEach(a => {
            const href = a.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto')) return;
            a.addEventListener('click', e => { e.preventDefault(); navigateTo(href); });
        });

        // ── Random hero image from city and omen ──
        const omenImages = [
            'bilder/city/city 1.webp',
            'bilder/city/city 3.webp',
            'bilder/city/city 4.webp',
            'bilder/city/city 5.webp',
            'bilder/city/city 6.webp',
            'bilder/omen/omen 1.webp',
            'bilder/omen/omen 2.webp',
            'bilder/omen/omen 3.webp',
            'bilder/omen/omen 4.webp',
            'bilder/omen/omen 5.webp',
            'bilder/omen/omen 6.webp',
        ];
        const heroImg = document.getElementById('hero-img');
        const randomSrc = omenImages[Math.floor(Math.random() * omenImages.length)];
        const preload = new Image();
        preload.src = randomSrc;
        preload.onload = () => { heroImg.src = randomSrc; heroImg.classList.add('loaded'); };

        // ── Static hover preview (crossfade) ──
        const imgA = document.getElementById('preview-img-a');
        const imgB = document.getElementById('preview-img-b');
        let active = 'a'; // which layer is currently visible

        // Preload all preview images
        document.querySelectorAll('.project-link[data-preview]').forEach(link => {
            const img = new Image(); img.src = link.dataset.preview;
        });

        document.querySelectorAll('.project-link[data-preview]').forEach(link => {
            link.addEventListener('mouseenter', () => {
                const src = link.dataset.preview;
                if (active === 'a') {
                    // Load new image into B, then crossfade
                    imgB.src = src;
                    imgB.style.opacity = '1';
                    imgA.style.opacity = '0';
                    active = 'b';
                } else {
                    imgA.src = src;
                    imgA.style.opacity = '1';
                    imgB.style.opacity = '0';
                    active = 'a';
                }
            });
        });

    </script>
</body>
</html>
